<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeSync 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-rose-950 via-pink-950 to-black text-white min-h-screen font-sans overflow-x-hidden">
    
    <!-- THE LOBBY -->
    <div id="lobby" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-white/5 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-pink-500/20 w-full max-w-md text-center">
            <h1 class="text-5xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-rose-300">VibeSync</h1>
            <p class="text-rose-200/70 mb-8 font-light tracking-wide">Our private listening room 💖</p>
            
            <input id="nameInput" placeholder="Your Name" class="w-full p-4 mb-6 bg-black/30 border border-pink-500/30 rounded-2xl focus:outline-none focus:ring-2 focus:ring-pink-500 placeholder-pink-200/30 text-white font-medium text-center">
            
            <div class="flex flex-col gap-5">
                <button onclick="createRoom()" class="w-full bg-gradient-to-r from-pink-600 to-rose-500 hover:from-pink-500 hover:to-rose-400 p-4 rounded-2xl font-bold transition-all shadow-[0_0_20px_rgba(219,39,119,0.4)] flex justify-center items-center gap-2">
                    <i class="fas fa-heart"></i> Create Our Room
                </button>
                
                <div class="flex items-center text-xs text-pink-300/40 uppercase tracking-widest before:flex-1 before:border-t before:border-pink-300/10 before:mr-4 after:flex-1 after:border-t after:border-pink-300/10 after:ml-4">Or Join</div>
                
                <div class="flex gap-2">
                    <input id="roomInput" placeholder="6-Digit Code" type="number" class="w-2/3 p-4 bg-black/30 border border-pink-500/30 rounded-2xl focus:outline-none focus:ring-2 focus:ring-pink-500 placeholder-pink-200/30 text-white text-center font-bold tracking-widest">
                    <button onclick="joinRoom()" class="w-1/3 bg-white/5 hover:bg-white/10 p-4 rounded-2xl font-bold transition-all border border-pink-500/20 text-pink-300">
                        Join
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- THE THEATER -->
    <div id="theater" class="hidden min-h-screen flex flex-col p-4 md:p-8 max-w-6xl mx-auto">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-black/20 p-4 rounded-3xl backdrop-blur-md border border-pink-500/10 gap-4">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-bold text-pink-400">Code: <span id="roomDisplay" class="text-white tracking-widest bg-black/40 px-3 py-1 rounded-lg ml-2"></span></h2>
                <button onclick="shareRoom()" class="bg-pink-900/40 hover:bg-pink-800/60 text-pink-200 px-4 py-2 rounded-xl text-sm transition-all border border-pink-500/30 flex items-center gap-2">
                    <i class="fas fa-copy"></i> Copy Invite
                </button>
            </div>
            <div class="flex items-center gap-3 bg-pink-950/50 px-6 py-2 rounded-full border border-pink-500/20 shadow-inner">
                <i class="fas fa-infinity text-pink-400 text-xs"></i>
                <span id="userList" class="font-medium text-pink-100 text-sm">Waiting for partner...</span>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-6">
            <!-- Left Side: Video & Controls -->
            <div class="w-full lg:w-2/3 flex flex-col gap-6">
                <div class="flex gap-2">
                    <!-- FIXED: Added handleSearchKeyPress here so Enter works! -->
                    <input id="songSearch" onkeypress="handleSearchKeyPress(event)" placeholder="Search for a song (e.g., Bollywood hits)..." class="flex-grow p-4 bg-black/40 border border-pink-500/30 rounded-2xl focus:outline-none focus:ring-2 focus:ring-pink-500 text-white font-medium shadow-inner">
                    <button onclick="searchSong()" class="bg-pink-600 hover:bg-pink-500 px-8 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-pink-500/40">
                        <i class="fas fa-search text-xl"></i>
                    </button>
                </div>

                <div id="videoContainer" class="w-full aspect-video bg-black/60 rounded-3xl border border-pink-500/20 flex items-center justify-center overflow-hidden shadow-2xl relative group">
                    <div class="text-center p-6 absolute">
                        <i class="fas fa-compact-disc text-5xl text-pink-500/30 mb-4 animate-spin-slow"></i>
                        <p class="text-pink-200/50 font-light">Waiting to play a song...</p>
                    </div>
                </div>

                <div class="flex justify-center gap-8 mb-6">
                    <button onclick="sendPlay()" class="bg-gradient-to-r from-rose-500 to-pink-600 hover:from-rose-400 hover:to-pink-500 w-16 h-16 rounded-full flex items-center justify-center text-2xl shadow-[0_0_20px_rgba(225,29,72,0.4)] transition-all transform hover:scale-110">
                        <i class="fas fa-play ml-1"></i>
                    </button>
                    <button onclick="sendPause()" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 w-16 h-16 rounded-full flex items-center justify-center text-2xl shadow-lg transition-all transform hover:scale-110 text-pink-300">
                        <i class="fas fa-pause"></i>
                    </button>
                </div>
            </div>

            <!-- Right Side: Love Notes Chat Station -->
            <div class="w-full lg:w-1/3 flex flex-col bg-white/5 border border-pink-500/20 rounded-3xl backdrop-blur-md overflow-hidden shadow-2xl h-[500px]">
                <div class="bg-black/30 p-4 border-b border-pink-500/20 text-center">
                    <h3 class="text-pink-300 font-bold tracking-widest text-sm uppercase"><i class="fas fa-envelope-open-text mr-2"></i> Love Notes</h3>
                </div>
                
                <div id="chatBox" class="flex-grow p-4 overflow-y-auto flex flex-col gap-3 scroll-smooth">
                    <div class="self-center text-xs text-pink-200/30 my-2">Room created. Waiting for messages...</div>
                </div>

                <div class="p-4 bg-black/40 border-t border-pink-500/20 flex gap-2">
                    <input id="chatInput" onkeypress="handleChatKeyPress(event)" placeholder="e.g. Tujh Mein Rab Dikhta Hai..." class="flex-grow bg-white/5 border border-pink-500/30 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-pink-500 placeholder-pink-200/30">
                    <button onclick="sendMessage()" class="bg-pink-600 hover:bg-pink-500 px-5 py-3 rounded-xl text-white transition-all">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = '';
        let myName = '';

        function createRoom() {
            myName = document.getElementById('nameInput').value.trim();
            if (!myName) return alert("Please enter your name first!");
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            enterRoom(myName, code);
        }

        function joinRoom() {
            myName = document.getElementById('nameInput').value.trim();
            const code = document.getElementById('roomInput').value.trim();
            if (!myName) return alert("Please enter your name first!");
            if (!code || code.length !== 6) return alert("Please enter a valid 6-digit room code!");
            enterRoom(myName, code);
        }

        function enterRoom(name, code) {
            currentRoom = code;
            socket.emit('join_room', { userName: name, roomCode: code });
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('theater').classList.remove('hidden');
            document.getElementById('roomDisplay').innerText = code;
        }

        function shareRoom() {
            const inviteText = `Hey! Let's listen to some music together! Join my room using code: ${currentRoom}`;
            navigator.clipboard.writeText(inviteText).then(() => {
                alert("Invite copied! Paste it in WhatsApp to your partner 💖");
            });
        }

        socket.on('update_user_list', (users) => {
            const names = users.map(u => u.name).join(' & ');
            document.getElementById('userList').innerText = names + (users.length === 1 ? ' (Waiting...)' : ' 💖');
        });

        // Search Functions
        function searchSong() {
            const query = document.getElementById('songSearch').value.trim();
            if(query) socket.emit('search_song', query);
        }

        // FIXED: Allows pressing Enter in the search bar
        function handleSearchKeyPress(e) {
            if(e.key === 'Enter') searchSong();
        }

        socket.on('receive_video', (data) => {
            const container = document.getElementById('videoContainer');
            container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${data.videoId}?autoplay=1&enablejsapi=1" title="${data.videoTitle}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen class="z-10 relative"></iframe>`;
        });

        function sendPlay() { socket.emit('send_play'); }
        function sendPause() { socket.emit('send_pause'); }

        // Chat Functions
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(msg) {
                socket.emit('chat_message', msg);
                input.value = '';
            }
        }

        function handleChatKeyPress(e) {
            if(e.key === 'Enter') sendMessage();
        }

        socket.on('receive_message', (data) => {
            const chatBox = document.getElementById('chatBox');
            const isMe = data.name === myName;
            
            const alignClass = isMe ? 'self-end bg-gradient-to-r from-pink-600 to-rose-500 rounded-br-sm' : 'self-start bg-white/10 rounded-bl-sm border border-pink-500/20';
            
            chatBox.innerHTML += `
                <div class="max-w-[80%] px-4 py-2 rounded-2xl ${alignClass} shadow-md animate-fade-in-up">
                    <span class="text-[10px] uppercase tracking-wider font-bold opacity-60 block mb-1">${data.name}</span>
                    <span class="text-sm">${data.msg}</span>
                </div>
            `;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
    <style>
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-spin-slow { animation: spin 4s linear infinite; }
    </style>
</body>
</html>
